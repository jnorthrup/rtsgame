# Kotlin Multiplatform Configuration
kotlin.multiplatform.enableCompilerArgumentsIncompatibleWithKotlinTargetAttribute=true
kotlin.multiplatform.enableCommonCompilerArguments=true
kotlin.mpp.applyDefaultHierarchyTemplate=false

# Performance optimizations
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true

# JVM options
org.gradle.jvmargs=-Xmx4g -XX:+UseParallelGC

# Kotlin compiler options
kotlin.compiler.execution.strategy=in-process
kotlin.incremental=true

# WASM options - deprecated properties removed for Kotlin 2.1.21

# Test configuration
kotlin.mpp.enableKotlinTestTask=true